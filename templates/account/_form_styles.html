{% comment %}
Inline styles applied to allauth forms — Tailwind utilities don't reach
unrendered Django form widgets, so we apply baseline styling here. Loaded
via {% include %} from each account/* template.
{% endcomment %}
<style>
    .auth-form input[type="text"],
    .auth-form input[type="email"],
    .auth-form input[type="password"],
    .auth-form input[type="url"] {
        width: 100%;
        padding: 0.55rem 0.75rem;
        border: 1px solid rgb(203 213 225);
        border-radius: 0.375rem;
        font-size: 0.9rem;
        background: #fff;
    }
    .auth-form input:focus {
        outline: 2px solid rgb(15 23 42);
        outline-offset: -1px;
        border-color: transparent;
    }
    .auth-form label {
        display: block;
        font-size: 0.875rem;
        font-weight: 500;
        color: rgb(51 65 85);
        margin-top: 0.75rem;
        margin-bottom: 0.25rem;
    }
    .auth-form .errorlist {
        color: rgb(220 38 38);
        font-size: 0.8125rem;
        margin: 0.25rem 0 0 0;
        padding-left: 1rem;
    }
    .auth-form .helptext, .auth-form small {
        color: rgb(100 116 139);
        font-size: 0.8125rem;
    }
    .auth-form button[type="submit"], .auth-form .primaryAction {
        margin-top: 1.25rem;
        width: 100%;
        padding: 0.6rem 1rem;
        background: rgb(15 23 42);
        color: #fff;
        border: 0;
        border-radius: 0.375rem;
        font-size: 0.9rem;
        cursor: pointer;
    }
    .auth-form button[type="submit"]:hover, .auth-form .primaryAction:hover {
        background: rgb(51 65 85);
    }
    .auth-form .secondaryAction {
        display: inline-block;
        margin-top: 1rem;
        font-size: 0.875rem;
        color: rgb(71 85 105);
    }
</style>
