<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <link rel="manifest" href="{% url 'core:manifest' %}">
    <title>{% block title %}DzTherapy{% endblock %}</title>
    {% load tailwind_cli %}
    {% tailwind_css %}
    <script src="https://unpkg.com/htmx.org@2.0.4" crossorigin="anonymous"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("{% url 'core:sw' %}");
        });
      }
    </script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased min-h-screen">
    <header class="border-b border-slate-200 bg-white">
        <div class="max-w-3xl mx-auto px-4 py-4">
            <h1 class="text-xl font-semibold tracking-tight">DzTherapy</h1>
        </div>
    </header>
    <main class="max-w-3xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
