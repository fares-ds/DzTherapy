services:
  db:
    image: postgres:16-alpine
    container_name: dztherapy_db
    environment:
      POSTGRES_DB: dztherapy
      POSTGRES_USER: dz
      POSTGRES_PASSWORD: dz
    ports:
      - "5434:5432"
    volumes:
      - dztherapy_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dz -d dztherapy"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dztherapy_redis
    ports:
      - "6385:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  dztherapy_pgdata:
